<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sole Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="./src/scripts/login.js" defer></script>
</head>
<body>
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>
    <main class="forgot-main">
        <h1>Forgot password?</h1>
      <div id="forgot-container" class="forgot-wrapper">
        <form id="forgotForm" class="forgot-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required />
          </div>
          <div class="form-group">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" required />
          </div>
          <button type="submit" class="forgotBtn">Submit</button>
        </form>
      </div>
    </main>
    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>
</body>
</html>
