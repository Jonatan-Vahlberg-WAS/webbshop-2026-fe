<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>

    <main class="admin-main">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="products">Products</button>
        <button class="admin-tab" data-tab="users">Users</button>
        <button class="admin-tab" data-tab="orders">Orders</button>
      </div>

      <div id="products-tab" class="tab-content active">
        <div class="admin-toolbar">
          <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
          />
          <div class="admin-filters">
            <select id="filterBrand">
              <option value="">All Brands</option>
            </select>
            <select id="filterStatus">
              <option value="">All Statuses</option>
              <option value="live">Live</option>
              <option value="upcoming">Upcoming</option>
              <option value="soldout">SoldOut</option>
            </select>
          </div>
          <button id="openCreateModalBtn" class="btn-primary">
            Create Product
          </button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table product-list-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Sizes & Stock</th>
                <th>Drop Start</th>
                <th>Drop End</th>
                <th>Drop Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr>
                <td colspan="7">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="users-tab" class="tab-content">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="3">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="orders-tab" class="tab-content">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>User</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody">
              <tr>
                <td colspan="7">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- MODAL -->
    <div id="productModal" class="modal-overlay" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Create Product</h2>
          <button id="closeModalBtn" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <form id="createProductForm" class="admin-form">
            <div class="admin-form-fields">
              <div class="admin-form-row">
                <label for="name">Name</label>
                <input
                  type="text"
                  id="name"
                  required
                  placeholder="e.g Jordan 1's"
                />
              </div>
              <div class="admin-form-row">
                <label for="brand">Brand</label>
                <input type="text" id="brand" required placeholder="e.g Nike" />
              </div>
              <div class="admin-form-row">
                <label for="price">Price</label>
                <input
                  type="number"
                  id="price"
                  step="0.01"
                  min="0"
                  required
                  placeholder="e.g 1399 SEK"
                />
              </div>
              <div class="admin-form-row">
                <label for="description">Description</label>
                <input type="text" id="description" />
              </div>
              <div class="admin-form-row">
                <label>Colors</label>
                <div id="colorsContainer">
                  <div class="color-pair">
                    <input
                      type="text"
                      name="colorName"
                      placeholder="Color name (e.g. White)"
                      required
                    />
                    <input
                      type="text"
                      name="colorHex"
                      placeholder="Hex (e.g. #fff)"
                      required
                    />
                    <button
                      type="button"
                      class="remove-color-btn"
                      style="display: none"
                    >
                      &times;
                    </button>
                  </div>
                </div>
                <button type="button" id="addColorBtn" class="admin-add-btn">
                  Add Color
                </button>
              </div>
              <div class="admin-form-row">
                <label>Sizes</label>
                <div id="sizesContainer">
                  <div class="size-stock-pair">
                    <input
                      type="text"
                      name="size"
                      placeholder="Size (e.g. 42)"
                      required
                    />
                    <input
                      type="number"
                      name="stock"
                      min="0"
                      placeholder="Stock (e.g. 5)"
                      required
                    />
                    <button
                      type="button"
                      class="remove-size-btn"
                      style="display: none"
                    >
                      &times;
                    </button>
                  </div>
                </div>
                <button type="button" id="addSizeBtn" class="admin-add-btn">
                  Add Size
                </button>
              </div>
              <div class="admin-form-row">
                <label for="images">Images (max 4, jpg/png/webp/svg)</label>
                <label for="images" class="file-upload-btn">
                  <i class="fa fa-upload"></i> Choose Files
                </label>
                <input
                  type="file"
                  id="images"
                  name="images"
                  accept=".jpg,.jpeg,.png,.webp,.svg"
                  multiple
                  style="display: none"
                />
                <span id="fileNames" class="file-names">No files chosen</span>
              </div>
              <div class="admin-form-row">
                <label for="dropAt">Drop Date</label>
                <input type="date" id="dropAt" name="dropAt" required />
              </div>
              <div class="admin-form-row">
                <label for="dropEnd">Drop End</label>
                <input type="date" id="dropEnd" name="dropEnd" />
              </div>
              <div class="admin-form-row">
                <label for="slug"
                  >Slug
                  <span style="font-weight: 400; color: #888"
                    >(auto-generated)</span
                  ></label
                >
                <input
                  type="text"
                  id="slug"
                  readonly
                  placeholder="generated from name"
                  style="background: #f5f5f5; color: #888"
                />
              </div>
            </div>

            <aside class="admin-product-preview">
              <div class="admin-product-preview-inner">
                <div class="admin-product-preview-img-wrap">
                  <img
                    id="previewImage"
                    src=""
                    alt="Preview"
                    style="display: none"
                  />
                </div>
                <div class="admin-product-preview-info">
                  <div
                    id="previewBrand"
                    class="admin-product-preview-brand"
                  ></div>
                  <div
                    id="previewName"
                    class="admin-product-preview-name"
                  ></div>
                  <div
                    id="previewPrice"
                    class="admin-product-preview-price"
                  ></div>
                </div>
              </div>
            </aside>

            <div class="admin-form-row full-width" style="text-align: center">
              <button type="submit" id="submitBtn">Create Product</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="confirmModal" class="modal-overlay" style="display: none">
      <div class="modal" style="max-width: 400px">
        <div class="modal-header">
          <h2 id="confirmTitle">Are you sure?</h2>
          <button id="confirmCloseBtn" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <p
            id="confirmMessage"
            style="margin-bottom: 1.5rem; color: var(--color-text-muted)"
          ></p>
          <div style="display: flex; gap: 1rem; justify-content: flex-end">
            <button id="confirmCancelBtn" class="admin-add-btn">Cancel</button>
            <button id="confirmOkBtn" class="admin-form button[type=submit]">
              Confirm
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
