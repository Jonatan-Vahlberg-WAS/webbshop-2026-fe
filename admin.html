<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>

    <main class="admin-main">
      <h1>Admin – Create Product</h1>

      <form id="createProductForm" class="admin-form">
        <div class="admin-form-row">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="admin-form-row">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="image">Image URL</label>
          <input type="url" id="image" required />
        </div>
        <div class="admin-form-row">
          <label for="slug">Slug <span style="font-weight:400;color:#888">(auto-generated)</span></label>
          <input type="text" id="slug" readonly placeholder="generated from name" style="background:#f5f5f5;color:#888" />
        </div>
        <button type="submit">Create Product</button>
      </form>

      <h2>Products</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Slug</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
