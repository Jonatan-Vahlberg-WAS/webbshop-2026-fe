<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="products.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">SOLE_<span class="logo-search">SEARCH</span></a>
        <ul class="nav-links">
          <li><a href="products.html" class="active">Products</a></li>
          <li><a href="cart.html" id="nav-cart">Cart</a></li>
          <li><a href="auth.html" id="nav-login">Login</a></li>
          <li><a href="admin.html" id="nav-admin">Admin</a></li>
          <li><button id="nav-logout">Logout</button></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="products-main">
      <div class="products-page-header">
        <h1>All Products</h1>
        <div class="products-controls">
          <div class="search-wrap">
            <input type="text" id="product-search" placeholder="Archive_Search" autocomplete="off" />
            <button type="button" aria-label="Search">Search</button>
          </div>
        </div>
      </div>
      <div id="products"></div>
      <div class="load-more-wrap">
        <button class="btn" id="load-drops"><span>Load more drops</span></button>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 Sole Search. All rights reserved.</p>
      </div>
    </footer>


    <!-- for navbar update just for permanent, will remove it after user profile is implemented -->
    <script type="module" src="./src/utils/auth.js"></script>
    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
