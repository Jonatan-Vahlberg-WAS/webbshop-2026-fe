<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile — Sole Search</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="profile.css" />
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body>

        <!-- HEADER -->
        <header class="site-header">
        <nav>
            <a href="index.html" class="logo">SOLE_<span class="logo-search">SEARCH</span></a>
            <ul class="nav-links">
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html" id="nav-cart">Cart</a></li>
            <li><a href="auth.html" id="nav-login">Login</a></li>
            <li><a href="admin.html" id="nav-admin">Admin</a></li>
            <li><button id="nav-logout">Logout</button></li>
            </ul>
        </nav>
        </header>

        <!-- MAIN -->
        <main class="profile-main">

        <!-- USER INFO -->
        <section class="profile-hero">
            <div class="profile-hero-info">
            <h1 id="profile-name" class="profile-name">Name</h1>
            </div>
            <div class="profile-hero-actions">
            <button class="btn btn--outline" id="edit-profile-btn">Edit Profile</button>
            <p class="save-success"></p>
            <!--<button class="btn btn--primary" id="logout-btn">Log Out</button>-->
            </div>
        </section>

        <div class="profile-container">

            <!-- LEFT COLUMN -->
            <div class="profile-left">

            <!-- PROFILE INFO-->
            <div class="profile-section" id="profile-info-section">
                <h2 class="profile-section-title">My Profile</h2>
                <h3>Email</h3>
                <div class="profile-email"></div>
                <h3>Address</h3>
                <div class="profile-address"></div>
                <div class="add-address">
                    <button class="btn btn--outline">Add Address</button>
                </div>
                <h3>Password</h3>
                <div class="profile-password"></div>
            </div>

            <!-- PROFILE INFO EDIT-->
            <div class="profile-section hidden" id="profile-edit-section">
                <h2 class="profile-section-title">Edit Profile</h2>
                <form>
                    <h3>Name</h3>
                    <label for="edit-name">Name</label>
                    <input type="text" id="edit-name"/>
                    <p class="name-error"></p>

                    <h3>Email</h3>
                    <label for="edit-email">Email</label>
                    <input type="email" id="edit-email"/>
                    <p class="email-error"></p>

                    <h3>Address</h3>
                    <label for="edit-street">Street</label>
                    <input type="text" id="edit-street"/>
                    <label for="edit-postal-code">Postal Code</label>
                    <input type="text" id="edit-postal-code"/>
                    <label for="edit-city">City</label>
                    <input type="text" id="edit-city"/>
                    <label for="edit-country">Country</label>
                    <input type="text" id="edit-country"/>

                    <h3>Password</h3>
                    <label for="edit-password">New Password</label>
                    <input type="password" id="edit-password">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password">
                    <p class="password-error"></p>

                    <button type="button" id="save-profile-btn">Save</button>
                    <p class="save-error"></p>
                    <button type="button" id="cancel-edit-btn">Cancel</button>
                </form>
            </div>
            

            <!-- ORDER HISTORY -->
            <section class="profile-section" id="order-history-section">
                <h2 class="profile-section-title">Order History</h2>
                <div id="order-history-list" class="order-list">
                <!-- orders rendered here by JS -->
                </div>
            </section>

            <!-- WISHLIST -->
            <section class="profile-section" id="wishlist-section">
                <h2 class="profile-section-title">Wishlist</h2>
                <div id="wishlist-list" class="wishlist-list">
                <!-- wishlist rendered here by JS -->
                </div>
            </section>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="profile-right">

            </div>
        </div>

        </main>

        <!-- FOOTER -->
        <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 Sole Search. All rights reserved.</p>
        </div>
        </footer>

        <script type="module" src="./src/utils/auth.js"></script>
        <script type="module" src="./src/scripts/profile.js"></script>

    </body>
</html>
