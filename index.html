<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">SOLE SEARCH</a>
        <ul class="nav-links">
          <li><a href="products.html">Products</a></li>
          <li><a href="cart.html">Cart</a></li>
          <li><a href="auth.html" id="nav-login">Login</a></li>
          <li><span id="nav-status" style="display:none">Profile</span></li>
          <li><a href="admin.html" id="nav-admin" style="display:none">Admin</a></li>

          <!-- Logout button, hidden by default, shown when user is logged in(for permanent navbar, will remove it after user profile is implemented) -->
          <li>
          <button id="nav-logout" onclick="logoutUser()" style="display:none">
            Logout
          </button>
          </li>
        </ul>
      </nav>
    </header>

    <!-- HERO (full width) -->
    <section class="hero">
      <div class="hero-product">
        <img id="hero-product-image" src="" alt="Upcoming sneaker drop" />
        <div class="hero-product-info">
          <h1 id="hero-product-name">Upcoming Drop</h1>
          <p id="hero-product-timer">Drop in: --:--:--</p>
          <!-- Placeholder for timer -->
          <button class="btn">Shop the drop</button>
        </div>
      </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="products-main">
      <h2>Featured products</h2>
      <div id="products"></div>
      <a href="products.html" class="btn">Check products</a>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2026 Sole Search. All rights reserved.</p>
      </div>
    </footer>

    <!-- for navbar update just for permanent, will remove it after user profile is implemented -->
    <script src="./src/utils/auth.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', updateNavbar)
    </script>

    <!-- PAGE-SPECIFIC JAVASCRIPT -->
    <script type="module" src="./src/scripts/index.js"></script>
  </body>
</html>
