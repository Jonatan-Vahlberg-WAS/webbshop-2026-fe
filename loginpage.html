<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>
    <main class="login-main">
        <h1>Log in</h1>
      <div id="login-container" class="login-wrapper">
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="text" id="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required />
            <p><a href="forgotpassword.html">Forgot your password?</a></p>
          </div>
          <button type="submit">Log in</button>
          <p>Dont have an account? <a href="register.html">Sign up</a> here!</p>
        </form>
      </div>
    </main>
    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>

    <script type="module" src="./src/scripts/login.js"></script>
</body>
</html>
