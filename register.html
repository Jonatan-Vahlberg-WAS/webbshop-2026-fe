<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- HEADER -->
    <header class="site-header">
      <nav>
        <a href="index.html" class="logo">Hakim Livs</a>
        <ul class="nav-links">
          <li><a href="products.html">Profil</a></li>
          <li><a href="cart.html">Karta</a></li>
          <li><a href="admin.html">Lägg till växt</a></li>
          <li><a href="register.html">Logga in</a></li>

        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <h1>Logga in</h1>
      <div id="register-container" class="register-wrapper">
        <form id="registerForm" class="register-form">
          
          <img src="logo-2.png" class="form-img-top-right">
          <img src="logo-2.png" class="form-img-bottom-left">

          <div class="form-group">
            <label for="name">Namn</label>
            <input type="text" id="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="password">Lösenord</label>
            <input type="password" id="password" required />
          </div>
          <a class="forgot-password" href="#">Glömt lösenord?</a>
          <button type="submit">Logga in</button>
          <a class="skapa-konto" href="#">Skapa konto</a>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-content">
        <p>&copy; 2024 Hakim Livs. All rights reserved.</p>
        <div class="footer-links">
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <a href="/terms">Terms</a>
        </div>
      </div>
    </footer>

    <script type="module" src="./src/scripts/register.js"></script>
  </body>
</html>
